spring.application.name=api-gateway
# Server
server.port=8081

# PostgreSQL (Neon) with local H2 fallback
spring.datasource.url=${DB_URL:jdbc:h2:mem:api_gateway;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PWD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Redis (Docker)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=

# JWT
jwt.secret=your-256-bit-secret-key-for-jwt-signing-please-change
jwt.expiration.ms=3600000

# Rate limiting defaults (seconds per token refill)
rate.limit.user.capacity=2
rate.limit.user.refill=5
rate.limit.ip.capacity=5
rate.limit.ip.refill=10