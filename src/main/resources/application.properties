spring.application.name=api-gateway
# Server
server.port=8081

# PostgreSQL (Neon). Fail fast if DB_URL is missing or the database is unreachable.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PWD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Redis (Docker)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=

# JWT
jwt.secret=your-256-bit-secret-key-for-jwt-signing-please-change
jwt.expiration.ms=3600000

# Rate limiting defaults (refill 3 tokens every 60 seconds)
rate.limit.user.capacity=3
rate.limit.user.refill.interval=60
rate.limit.user.refill.amount=3
rate.limit.ip.capacity=3
rate.limit.ip.refill.interval=60
rate.limit.ip.refill.amount=3